<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Painting</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    background:#222;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#444;
}
</style>

</head>

<body>

<div class="container">

<h1>Add New Painting</h1>

<form id="paintingForm">

<label>Title</label>
<input type="text" id="title" required>

<label>Price</label>
<input type="number" id="price" required>

<label>Description</label>
<textarea id="description" rows="5"></textarea>

<label>Select Image</label>
<input type="file" id="image" accept="image/*" required>

<button type="submit">
Save Painting
</button>

</form>

</div>

<script>
document.getElementById("paintingForm").addEventListener("submit",function(e){

e.preventDefault();

alert("The form is ready. Next we'll connect it to upload images and save painting data.");

});
</script>

</body>
</html>
