<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin Login | Kabul Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body data-page="login">
<main class="admin-login-shell">
  <section class="admin-card">
    <p class="admin-muted">Kabul Art Administration</p>
    <h1>Sign In</h1>
    <p>Use your admin credentials to manage paintings, uploads, and homepage settings.</p>

    <form id="login-form" class="admin-form">
      <div class="admin-field">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required>
      </div>

      <div class="admin-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="admin-button" type="submit">Log In</button>
      <p class="admin-status" data-admin-status aria-live="polite"></p>
    </form>
  </section>
</main>

<script src="/admin/admin-app.js" defer></script>
</body>
</html>
